<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Project Shepherdess - Coming Soon</title>
    <meta name="description" content="A.G.I. in the context of ecological stewardship and human abundance.">
    <link rel="canonical" href="https://shepherdess.io/">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://shepherdess.io/">
    <meta property="og:title" content="Project Shepherdess - Coming Soon">
    <meta property="og:description" content="A.G.I. in the context of ecological stewardship and human abundance.">
    <meta property="og:image" content="https://shepherdess.io/images/SIOLogo.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Project Shepherdess - Coming Soon">
    <meta name="twitter:description" content="A.G.I. in the context of ecological stewardship and human abundance.">
    <meta name="twitter:image" content="https://shepherdess.io/images/SIOLogo.png">
    <meta name="theme-color" content="#05070b">
    <link rel="icon" href="favcon.png" type="image/png" sizes="32x32">
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070b;
        --fg: #f4f7fb;
        --muted: rgba(244, 247, 251, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        align-items: center;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        padding: max(2rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
      }

      main {
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: clamp(1.1rem, 3vw, 1.75rem);
        justify-content: center;
        min-height: calc(100vh - 4rem);
        text-align: center;
        width: min(100%, 46rem);
      }

      .logo {
        filter: invert(1);
        height: auto;
        max-width: min(74vw, 24rem);
        opacity: 0.96;
        width: 24rem;
      }

      h1 {
        font-size: clamp(0.8rem, 1.6vw, 1rem);
        font-weight: 700;
        letter-spacing: 0.28em;
        line-height: 1.4;
        margin: 0;
        text-transform: uppercase;
      }

      p {
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.25rem);
        line-height: 1.45;
        margin: 0;
        max-width: 38rem;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="images/SIOLogo.png" alt="Project Shepherdess logo">
      <h1>Coming Soon</h1>
      <p>A.G.I. in the context of ecological stewardship and human abundance</p>
    </main>
  </body>
</html>
